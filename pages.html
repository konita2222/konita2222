<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>近未来コネクト｜便利ページまとめ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 10% 20%, #030514, #000000);
            font-family: 'Inter', 'Space Grotesk', system-ui, -apple-system, sans-serif;
            color: #eef5ff;
            line-height: 1.5;
            scroll-behavior: smooth;
        }

        .bg-fx {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
        }

        .glow-orb {
            position: fixed;
            width: 70vw;
            height: 70vw;
            background: radial-gradient(circle, rgba(0, 180, 255, 0.2) 0%, rgba(0, 0, 0, 0) 70%);
            top: -20%;
            right: -20%;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            pointer-events: none;
        }

        .glow-orb2 {
            bottom: -10%;
            left: -20%;
            top: auto;
            background: radial-gradient(circle, rgba(255, 80, 120, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            width: 80vw;
            height: 80vw;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 2rem 5rem;
            position: relative;
        }

        .hero {
            text-align: center;
            margin-bottom: 3rem;
            padding: 2.5rem 1rem 1.5rem;
            border-bottom: 1px solid rgba(0, 255, 255, 0.3);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            border-radius: 60px 60px 40px 40px;
        }

        .hero h1 {
            font-size: 3.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFFFFF, #0ff, #a0f0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
            text-shadow: 0 0 8px rgba(0,255,255,0.3);
        }

        .hero .sub {
            font-size: 1.2rem;
            margin-top: 0.75rem;
            opacity: 0.8;
            font-weight: 300;
            letter-spacing: 1px;
            display: flex;
            justify-content: center;
            gap: 1.2rem;
            flex-wrap: wrap;
        }

        .chip {
            background: rgba(0, 255, 255, 0.1);
            backdrop-filter: blur(4px);
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            border: 0.5px solid rgba(0,255,255,0.5);
            font-weight: 500;
        }

        .tabs-wrap {
            display: flex;
            justify-content: center;
            margin-bottom: 2.5rem;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: rgba(20, 30, 45, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 255, 255, 0.4);
            padding: 0.8rem 2rem;
            font-weight: 600;
            font-size: 1rem;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #ccf4ff;
            font-family: 'Space Grotesk', monospace;
            letter-spacing: 0.5px;
        }

        .tab-btn i { margin-right: 8px; }

        .tab-btn.active {
            background: linear-gradient(95deg, #00ccff22, #00aaff55);
            border-color: #0cf;
            color: white;
            text-shadow: 0 0 6px cyan;
            box-shadow: 0 0 12px rgba(0, 180, 255, 0.5);
        }

        .tab-btn:hover:not(.active) {
            border-color: #0cf;
            background: rgba(0, 200, 255, 0.2);
            transform: translateY(-2px);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.8rem;
            margin-top: 1rem;
        }

        .card {
            background: rgba(12, 20, 28, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            border: 1px solid rgba(0, 255, 255, 0.25);
            overflow: hidden;
            transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: #0cf;
            box-shadow: 0 25px 40px rgba(0, 160, 255, 0.2);
            background: rgba(10, 25, 35, 0.8);
        }

        .card-content {
            padding: 1.6rem 1.5rem 1.8rem;
            flex: 1;
        }

        .card-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            display: inline-block;
            background: linear-gradient(145deg, #0cf, #3a86ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .card h3 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .badge {
            font-size: 0.65rem;
            background: rgba(0, 255, 255, 0.2);
            padding: 0.2rem 0.7rem;
            border-radius: 20px;
            color: #9effff;
        }

        .badge.cn {
            background: rgba(255, 70, 70, 0.2);
            border-left: 2px solid #ff5e7e;
            color: #ffb7c1;
        }

        .description {
            font-size: 0.9rem;
            opacity: 0.8;
            margin: 0.8rem 0 1.2rem;
            line-height: 1.4;
        }

        .card-footer {
            margin-top: auto;
            padding: 0 1.5rem 1.5rem 1.5rem;
        }

        .btn-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 200, 255, 0.12);
            backdrop-filter: blur(4px);
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            text-decoration: none;
            color: #b4f5ff;
            font-weight: 500;
            font-size: 0.85rem;
            border: 0.5px solid rgba(0,255,255,0.4);
            transition: all 0.2s;
        }

        .btn-link:hover {
            background: #00cf33;
            color: white;
            border-color: cyan;
            box-shadow: 0 0 8px cyan;
        }

        .footer-note {
            text-align: center;
            margin-top: 4rem;
            padding-top: 2rem;
            border-top: 1px dashed rgba(0,255,255,0.3);
            font-size: 0.8rem;
            opacity: 0.6;
        }

        @media (max-width: 700px) {
            .container { padding: 1rem; }
            .hero h1 { font-size: 2rem; }
            .tab-btn { padding: 0.5rem 1.2rem; font-size: 0.8rem; }
            .grid { gap: 1rem; }
        }

        .tab-pane {
            display: none;
            animation: fadeSlideUp 0.45s ease-out forwards;
        }

        .tab-pane.active-pane { display: block; }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(18px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
<div class="bg-fx"></div>
<div class="glow-orb"></div>
<div class="glow-orb glow-orb2"></div>

<div class="container">
    <div class="hero">
        <h1><i class="fas fa-microchip"></i> 近未来コネクト</h1>
        <div class="sub">
            <span class="chip"><i class="fas fa-bolt"></i> 次世代ツール集</span>
            <span class="chip"><i class="fas fa-globe"></i> 拡張インデックス版</span>
        </div>
        <p style="margin-top: 1rem; max-width: 700px; margin-inline: auto; font-weight: 300;">AI・生産性・グラフィック・開発支援ツールを大量追加した最先端ダッシュボード</p>
    </div>

    <div class="tabs-wrap">
        <div class="tab-btn active" data-tab="all"><i class="fas fa-cubes"></i> すべてのツール</div>
        <div class="tab-btn" data-tab="cn"><i class="fas fa-flag-china"></i> 中華製ページ特集</div>
        <div class="tab-btn" data-tab="global"><i class="fas fa-network-wired"></i> グローバル・ユーティリティ</div>
    </div>

    <div id="tab-all" class="tab-pane active-pane">
        <div class="grid" id="all-grid"></div>
    </div>
    <div id="tab-cn" class="tab-pane">
        <div class="grid" id="cn-grid"></div>
    </div>
    <div id="tab-global" class="tab-pane">
        <div class="grid" id="global-grid"></div>
    </div>

    <div class="footer-note">
        <i class="fas fa-satellite-dish"></i> 近未来的ダッシュボード | 随時アップデート
    </div>
</div>

<script>
    const pages = [
        // === 中華製クオリティ ===
        { name: "DeepSeek (深度求索)", icon: "fa-brain", desc: "驚異的なコード・ロジック能力を持つ無料の爆速AI。世界を震撼させているトップランナー。", tags: ["cn", "ai"], url: "https://chat.deepseek.com/", category: "cn" },
        { name: "Kimi 智能助手", icon: "fa-rocket", desc: "超長文のデータ読み込みや論文解析に非常に強い、中国本土で大人気のアシスタントAI。", tags: ["cn", "ai"], url: "https://kimi.moonshot.cn/", category: "cn" },
        { name: "通義千问 (Tongyi Qianwen)", icon: "fa-comments", desc: "アリババグループが開発したLLM。ビジネス資料の要約、多言語対話に優れる。", tags: ["cn", "ai"], url: "https://tongyi.aliyun.com/", category: "cn" },
        { name: "文心一言 (ERNIE Bot)", icon: "fa-feather-alt", desc: "Baidu（百度）が誇るフラッグシップAI。中国国内の情報検索や知識ベースに最適。", tags: ["cn", "ai"], url: "https://yiyan.baidu.com/", category: "cn" },
        { name: "剪映 (CapCut Web)", icon: "fa-video", desc: "ByteDance製。大人気動画編集アプリのブラウザ版。AI自動字幕や高度なエフェクトが無料。", tags: ["cn", "media"], url: "https://www.capcut.com/", category: "cn" },
        { name: "WPS Office 雲オフィス", icon: "fa-file-alt", desc: "非常に軽快なオンラインオフィススイート。PDF相互変換や複数人での共同編集に対応。", tags: ["cn", "productivity"], url: "https://www.kdocs.cn/", category: "cn" },
        { name: "百度翻訳 (Baidu Fanyi)", icon: "fa-language", desc: "最先端のニューラルネットワーク翻訳。特に中国語⇔日本語の間では驚異的な自然さを誇る。", tags: ["cn", "translate"], url: "https://fanyi.baidu.com/", category: "cn" },
        { name: "Quark (夸克)", icon: "fa-search", desc: "AI検索、クラウドストレージ、ドキュメントスキャンを高次元で融合した中国発の次世代ブラウザポータル。", tags: ["cn", "utility"], url: "https://www.quark.cn/", category: "cn" },
        { name: "Kling AI (快手)", icon: "fa-film", desc: "極めてリアルな動画を生成できると世界中で話題になった、中国発の最先端AI動画生成プラットフォーム。", tags: ["cn", "media"], url: "https://klingai.com/", category: "cn" },

        // === グローバル/その他 近未来的便利ツール ===
        { name: "ChatGPT (OpenAI)", icon: "fa-robot", desc: "AI時代の原点にして頂点。最新モデルが高度な推論、画像認識、音声対話を実現。", tags: ["global", "ai"], url: "https://chatgpt.com/", category: "global" },
        { name: "Claude (Anthropic)", icon: "fa-pen-fancy", desc: "極めて自然で人間らしい文章作成と、極めて美しいプログラミングコードを生成する高性能AI。", tags: ["global", "ai"], url: "https://claude.ai/", category: "global" },
        { name: "Perplexity AI", icon: "fa-question-circle", desc: "ネット上の最新情報をリアルタイム検索し、情報ソースのリンク付きで回答をまとめる革新的な検索AI。", tags: ["global", "search"], url: "https://www.perplexity.ai/", category: "global" },
        { name: "v0 by Vercel", icon: "fa-code-branch", desc: "テキストで指示するだけで、実用的なUIデザインやフロントエンドコードを瞬時に自動生成する開発AI。", tags: ["global", "dev"], url: "https://v0.dev/", category: "global" },
        { name: "GitHub", icon: "fa-git-alt", desc: "世界中の開発者がコードを共有する聖地。プログラミング学習やオープンソースの宝庫。", tags: ["global", "dev"], url: "https://github.com/", category: "global" },
        { name: "Midjourney", icon: "fa-palette", desc: "Discord上で動作する、圧倒的な芸術性とクオリティを誇る最高峰のイラスト・画像生成AI。", tags: ["global", "design"], url: "https://www.midjourney.com/", category: "global" },
        { name: "Civitai", icon: "fa-images", desc: "Stable Diffusionなどの画像生成AIのモデルやリソースが世界中から集まる最大級のコミュニティサイト。", tags: ["global", "design"], url: "https://civitai.com/", category: "global" },
        { name: "Notion", icon: "fa-tasks", desc: "メモ、タスク、データベース、ドキュメント管理をすべて一元化できる最強の生産性向上ツール。", tags: ["global", "productivity"], url: "https://www.notion.so/", category: "global" },
        { name: "Gamma App", icon: "fa-chalkboard", desc: "テキストやメモを入力するだけで、プロレベルの美しいプレゼン用スライドを自動構築するデザインAI。", tags: ["global", "ai"], url: "https://gamma.app/", category: "global" },
        { name: "Excalidraw", icon: "fa-pencil-ruler", desc: "ブラウザ上でサクサク描ける手書き風ホワイトボード。図解やアイデアのブレインストーミングに最適。", tags: ["global", "design"], url: "https://excalidraw.com/", category: "global" },
        { name: "TinyWow", icon: "fa-magic", desc: "PDF変換、画像加工、動画編集、音声抽出など、日常のちょっとした作業を完全無料で処理できる万能ツール集。", tags: ["global", "utility"], url: "https://tinywow.com/", category: "global" },
        { name: "Remove.bg", icon: "fa-image", desc: "画像をアップロードするだけで、被写体の背景をわずか5秒で正確に消去・透過するAIサービス。", tags: ["global", "media"], url: "https://www.remove.bg/", category: "global" },
        { name: "CloudConvert", icon: "fa-exchange-alt", desc: "数百種類以上のファイル形式（動画・音楽・ドキュメント）を安全に高速変換するクラウドコンバーター。", tags: ["global", "utility"], url: "https://cloudconvert.com/", category: "global" },
        { name: "Hugging Face Spaces", icon: "fa-robot", desc: "世界中の最新AIモデルのデモを、ブラウザ上で実際に触って試すことができるWeb最大のAIコミュニティプラットフォーム。", tags: ["global", "ai"], url: "https://huggingface.co/spaces", category: "global" },
        { name: "Ray.so", icon: "fa-code", desc: "ソースコードを貼り付けるだけで、エンジニアのSNS共有に最適な美しいグラデーション背景付きの画像に変換。", tags: ["global", "dev"], url: "https://ray.so/", category: "global" },
        { name: "Canva", icon: "fa-paintbrush", desc: "豊富なテンプレートから、サムネイルやポスター、ロゴをドラッグ＆ドロップだけで作れる万能デザインプラットフォーム。", tags: ["global", "design"], url: "https://www.canva.com/", category: "global" }
        { name: "Mp3Player", icon: "fa-code", desc: "私が作ったmp3プレイヤー。", tags: ["global", "design"], url: "https://www.canva.com/", category: "global" }
    ];

    function renderCategory(categoryId, containerId) {
        let filtered = [];
        if (categoryId === 'all') { filtered = [...pages]; } 
        else if (categoryId === 'cn') { filtered = pages.filter(p => p.category === 'cn'); } 
        else if (categoryId === 'global') { filtered = pages.filter(p => p.category === 'global'); }
        
        const container = document.getElementById(containerId);
        if (!container) return;
        
        let html = '';
        for (let item of filtered) {
            let badgeHtml = item.category === 'cn' 
                ? `<span class="badge cn"><i class="fas fa-flag-china"></i> 中華製先端</span>` 
                : `<span class="badge"><i class="fas fa-globe-americas"></i> グローバル</span>`;
            html += `
                <div class="card">
                    <div class="card-content">
                        <div class="card-icon"><i class="fas ${item.icon}"></i></div>
                        <h3>${escapeHtml(item.name)} ${badgeHtml}</h3>
                        <div class="description">${escapeHtml(item.desc)}</div>
                    </div>
                    <div class="card-footer">
                        <a href="${item.url}" target="_blank" rel="noopener noreferrer" class="btn-link">
                            <i class="fas fa-external-link-alt"></i> サービスへ
                        </a>
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }

    function initTabs() {
        renderCategory('all', 'all-grid');
        renderCategory('cn', 'cn-grid');
        renderCategory('global', 'global-grid');

        const tabs = document.querySelectorAll('.tab-btn');
        const panes = document.querySelectorAll('.tab-pane');
        tabs.forEach(btn => {
            btn.addEventListener('click', () => {
                const tabId = btn.getAttribute('data-tab');
                tabs.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                panes.forEach(pane => pane.classList.remove('active-pane'));
                document.getElementById(`tab-${tabId}`).classList.add('active-pane');
            });
        });
    }

    window.addEventListener('DOMContentLoaded', () => {
        initTabs();
        document.body.style.opacity = '0';
        setTimeout(() => {
            document.body.style.transition = 'opacity 0.5s ease';
            document.body.style.opacity = '1';
        }, 50);
    });
</script>
</body>
</html>
