<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>近未来コネクト｜便利ページまとめ</title>
    <!-- 使用 Google Fonts 增强未来感字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 (無料アイコン) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 10% 20%, #030514, #000000);
            font-family: 'Inter', 'Space Grotesk', system-ui, -apple-system, sans-serif;
            color: #eef5ff;
            line-height: 1.5;
            scroll-behavior: smooth;
        }

        /* 近未来的グリッド背景＋グローエフェクト */
        .bg-fx {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
        }

        .glow-orb {
            position: fixed;
            width: 70vw;
            height: 70vw;
            background: radial-gradient(circle, rgba(0, 180, 255, 0.2) 0%, rgba(0, 0, 0, 0) 70%);
            top: -20%;
            right: -20%;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            pointer-events: none;
        }

        .glow-orb2 {
            bottom: -10%;
            left: -20%;
            top: auto;
            background: radial-gradient(circle, rgba(255, 80, 120, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            width: 80vw;
            height: 80vw;
        }

        /* メインコンテナ */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 2rem 5rem;
            position: relative;
            backdrop-filter: blur(0px);
        }

        /* ヘッダー 未来的なネオン */
        .hero {
            text-align: center;
            margin-bottom: 3rem;
            padding: 2.5rem 1rem 1.5rem;
            border-bottom: 1px solid rgba(0, 255, 255, 0.3);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            border-radius: 60px 60px 40px 40px;
        }

        .hero h1 {
            font-size: 3.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFFFFF, #0ff, #a0f0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
            text-shadow: 0 0 8px rgba(0,255,255,0.3);
        }

        .hero .sub {
            font-size: 1.2rem;
            margin-top: 0.75rem;
            opacity: 0.8;
            font-weight: 300;
            letter-spacing: 1px;
            display: flex;
            justify-content: center;
            gap: 1.2rem;
            flex-wrap: wrap;
        }

        .chip {
            background: rgba(0, 255, 255, 0.1);
            backdrop-filter: blur(4px);
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            border: 0.5px solid rgba(0,255,255,0.5);
            font-weight: 500;
        }

        /* タブ切り替えUI (近未来的スイッチ) */
        .tabs-wrap {
            display: flex;
            justify-content: center;
            margin-bottom: 2.5rem;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: rgba(20, 30, 45, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 255, 255, 0.4);
            padding: 0.8rem 2rem;
            font-weight: 600;
            font-size: 1rem;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #ccf4ff;
            font-family: 'Space Grotesk', monospace;
            letter-spacing: 0.5px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .tab-btn i {
            margin-right: 8px;
        }

        .tab-btn.active {
            background: linear-gradient(95deg, #00ccff22, #00aaff55);
            border-color: #0cf;
            color: white;
            text-shadow: 0 0 6px cyan;
            box-shadow: 0 0 12px rgba(0, 180, 255, 0.5);
        }

        .tab-btn:hover:not(.active) {
            border-color: #0cf;
            background: rgba(0, 200, 255, 0.2);
            transform: translateY(-2px);
        }

        /* カードグリッド */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.8rem;
            margin-top: 1rem;
        }

        /* 未来型カード */
        .card {
            background: rgba(12, 20, 28, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            border: 1px solid rgba(0, 255, 255, 0.25);
            overflow: hidden;
            transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: #0cf;
            box-shadow: 0 25px 40px rgba(0, 160, 255, 0.2);
            background: rgba(10, 25, 35, 0.8);
        }

        .card-content {
            padding: 1.6rem 1.5rem 1.8rem;
            flex: 1;
        }

        .card-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            display: inline-block;
            background: linear-gradient(145deg, #0cf, #3a86ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .card h3 {
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .badge {
            font-size: 0.65rem;
            background: rgba(0, 255, 255, 0.2);
            padding: 0.2rem 0.7rem;
            border-radius: 20px;
            font-weight: 400;
            color: #9effff;
        }

        .badge.cn {
            background: rgba(255, 70, 70, 0.2);
            border-left: 2px solid #ff5e7e;
            color: #ffb7c1;
        }

        .description {
            font-size: 0.9rem;
            opacity: 0.8;
            margin: 0.8rem 0 1.2rem;
            line-height: 1.4;
        }

        .card-footer {
            margin-top: auto;
            padding: 0 1.5rem 1.5rem 1.5rem;
        }

        .btn-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 200, 255, 0.12);
            backdrop-filter: blur(4px);
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            text-decoration: none;
            color: #b4f5ff;
            font-weight: 500;
            font-size: 0.85rem;
            border: 0.5px solid rgba(0,255,255,0.4);
            transition: all 0.2s;
        }

        .btn-link:hover {
            background: #00cf33;
            color: white;
            border-color: cyan;
            box-shadow: 0 0 8px cyan;
        }

        /* フッター */
        .footer-note {
            text-align: center;
            margin-top: 4rem;
            padding-top: 2rem;
            border-top: 1px dashed rgba(0,255,255,0.3);
            font-size: 0.8rem;
            opacity: 0.6;
        }

        /* レスポンシブ */
        @media (max-width: 700px) {
            .container {
                padding: 1rem;
            }
            .hero h1 {
                font-size: 2rem;
            }
            .tab-btn {
                padding: 0.5rem 1.2rem;
                font-size: 0.8rem;
            }
            .grid {
                gap: 1rem;
            }
        }

        /* アニメーション表示用 */
        .tab-pane {
            display: none;
            animation: fadeSlideUp 0.45s ease-out forwards;
        }

        .tab-pane.active-pane {
            display: block;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(18px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
<div class="bg-fx"></div>
<div class="glow-orb"></div>
<div class="glow-orb glow-orb2"></div>

<div class="container">
    <div class="hero">
        <h1><i class="fas fa-microchip"></i> 近未来コネクト</h1>
        <div class="sub">
            <span class="chip"><i class="fas fa-bolt"></i> 次世代ツール集</span>
            <span class="chip"><i class="fas fa-globe"></i> グローバル+中華製先端サービス</span>
        </div>
        <p style="margin-top: 1rem; max-width: 700px; margin-inline: auto; font-weight: 300;">AI・生産性・翻訳・デザイン・クラウド — あなたの可能性を拡張する便利ページを厳選</p>
    </div>

    <!-- タブ切り替え部 (オール, 中華製特集, グローバル＆ユーティリティ) -->
    <div class="tabs-wrap">
        <div class="tab-btn active" data-tab="all"><i class="fas fa-cubes"></i> すべてのツール</div>
        <div class="tab-btn" data-tab="cn"><i class="fas fa-flag-china"></i> 中華製ページ特集</div>
        <div class="tab-btn" data-tab="global"><i class="fas fa-network-wired"></i> グローバル・ユーティリティ</div>
    </div>

    <!-- 全カードコンテンツ (動的生成のためJSで管理、ただしマークアップ内蔵してJSでフィルタでもOKだが保守性のため埋め込み) -->
    <div id="tab-all" class="tab-pane active-pane">
        <div class="grid" id="all-grid"></div>
    </div>
    <div id="tab-cn" class="tab-pane">
        <div class="grid" id="cn-grid"></div>
    </div>
    <div id="tab-global" class="tab-pane">
        <div class="grid" id="global-grid"></div>
    </div>

    <div class="footer-note">
        <i class="fas fa-satellite-dish"></i> 近未来的ダッシュボード | 収録サイトはすべて安全な公知サービス | 随時アップデート
    </div>
</div>

<script>
    // 便利ページデータ定義 (中華製＋グローバルハイブリッド)
    const pages = [
        // === 中華製クオリティ (中国サービス・ツール) ===
        { name: "DeepSeek (深度求索)", icon: "fa-brain", desc: "最先端の大規模言語モデル (無料)。文章生成・コード・分析が驚異的。中国製AIのフロントランナー。", tags: ["cn", "ai"], url: "https://chat.deepseek.com/", category: "cn" },
        { name: "通義千问 (Tongyi Qianwen)", icon: "fa-comments", desc: "アリババグループのLLM、文章作成から要約、データ分析まで多用途。", tags: ["cn", "ai"], url: "https://tongyi.aliyun.com/", category: "cn" },
        { name: "文心一言 (ERNIE Bot)", icon: "fa-feather-alt", desc: "Baidu製、中国を代表する生成AI。画像生成や知識検索にも強い。", tags: ["cn", "ai"], url: "https://yiyan.baidu.com/", category: "cn" },
        { name: "Canva (中国版も)", icon: "fa-paintbrush", desc: "世界のデザインツールだが、中国でも万能テンプレート・コラボ。", tags: ["cn", "design"], url: "https://www.canva.com/", category: "global" }, // globalに近いが便利なのでピック
        { name: "剪映 (CapCut Web)", icon: "fa-video", desc: "ByteDance製、プロ級動画編集がブラウザで無料。テンプレート多数。", tags: ["cn", "media"], url: "https://www.capcut.com/", category: "cn" },
        { name: "WPS Office 雲オフィス", icon: "fa-file-alt", desc: "中国発の統合オフィススイート。オンライン編集・PDF変換・共同作業。", tags: ["cn", "productivity"], url: "https://www.kdocs.cn/", category: "cn" },
        { name: "百度翻訳 (Baidu Fanyi)", icon: "fa-language", desc: "高精度な中国語翻訳＆多言語対応。AIニューラル翻訳が強力。", tags: ["cn", "translate"], url: "https://fanyi.baidu.com/", category: "cn" },
        { name: "Quark (夸克)", icon: "fa-search", desc: "スマートブラウザ＆AI検索・クラウド機能搭載。中国で人気の次世代ブラウザ。", tags: ["cn", "utility"], url: "https://www.quark.cn/", category: "cn" },

        // === グローバル/その他 近未来的便利ツール ===
        { name: "Notion AI", icon: "fa-tasks", desc: "オールインワンワークスペース + AIアシスタント。知識管理の最先端。", tags: ["global", "productivity"], url: "https://www.notion.so/", category: "global" },
        { name: "Gamma AI スライド", icon: "fa-chalkboard", desc: "AIが美しいプレゼンを自動生成。未来の資料作成体験。", tags: ["global", "ai"], url: "https://gamma.app/", category: "global" },
        { name: "Perplexity AI", icon: "fa-question-circle", desc: "AI検索エンジン。引用付きで最新情報を要約。リサーチに革命。", tags: ["global", "search"], url: "https://www.perplexity.ai/", category: "global" },
        { name: "Replicate", icon: "fa-cloud-upload-alt", desc: "機械学習モデルをクラウドで実行。画像生成・LLMをAPI/UIで。", tags: ["global", "dev"], url: "https://replicate.com/", category: "global" },
        { name: "Excalidraw", icon: "fa-pencil-ruler", desc: "手書き風ダイアグラム／ホワイトボード。暗いテーマでのコラボに最適", tags: ["global", "design"], url: "https://excalidraw.com/", category: "global" },
        { name: "TinyWow", icon: "fa-magic", desc: "無料ユーティリティ (PDF変換・画像編集・動画切り抜き) 手間いらず。", tags: ["global", "utility"], url: "https://tinywow.com/", category: "global" },
        { name: "Remove.bg (背景透過)", icon: "fa-image", desc: "AI背景透過、高品質な処理を高速で提供。デザイン必須。", tags: ["global", "media"], url: "https://www.remove.bg/", category: "global" },
        { name: "CloudConvert", icon: "fa-exchange-alt", desc: "あらゆるファイル変換 (動画、音声、ドキュメント) クラウドネイティブ。", tags: ["global", "utility"], url: "https://cloudconvert.com/", category: "global" },
        { name: "Hugging Face Spaces", icon: "fa-robot", desc: "AIデモ・モデルを試せる。未来のAIハブ。", tags: ["global", "ai"], url: "https://huggingface.co/spaces", category: "global" },
        { name: "Ray.so", icon: "fa-code", desc: "コードを美しい画像に変換。開発者＆SNS共有に最適。", tags: ["global", "dev"], url: "https://ray.so/", category: "global" }
    ];

    // 補足: 中華製でもっと明示的に入れたいページはさらに追加可能。しかし既存で十分未来的便利さをカバー
    // さらに、既存 "Canva" はグローバルだが中華製っぽさもあるため中国的便利さ一緒に分類してもいいがtaxonomy維持
    // ただしフィルタで中華製タグには 「cn」カテゴリをもつものとしてフィルタ。
    function renderCategory(categoryId, containerId) {
        let filtered = [];
        if (categoryId === 'all') {
            filtered = [...pages];
        } else if (categoryId === 'cn') {
            filtered = pages.filter(p => p.category === 'cn');
        } else if (categoryId === 'global') {
            filtered = pages.filter(p => p.category === 'global');
        }
        const container = document.getElementById(containerId);
        if (!container) return;
        if (filtered.length === 0) {
            container.innerHTML = `<div style="text-align:center;padding:3rem; background:rgba(0,0,0,0.4); border-radius:40px;"><i class="fas fa-database"></i> 該当ページは準備中です... 近未来リストを更新予定</div>`;
            return;
        }
        let html = '';
        for (let item of filtered) {
            // 中華製バッジ判定
            let badgeHtml = '';
            if (item.category === 'cn') {
                badgeHtml = `<span class="badge cn"><i class="fas fa-flag-china"></i> 中華製先端</span>`;
            } else {
                badgeHtml = `<span class="badge"><i class="fas fa-globe-americas"></i> グローバル</span>`;
            }
            html += `
                <div class="card">
                    <div class="card-content">
                        <div class="card-icon"><i class="fas ${item.icon}"></i></div>
                        <h3>${escapeHtml(item.name)} ${badgeHtml}</h3>
                        <div class="description">${escapeHtml(item.desc)}</div>
                    </div>
                    <div class="card-footer">
                        <a href="${item.url}" target="_blank" rel="noopener noreferrer" class="btn-link">
                            <i class="fas fa-external-link-alt"></i> サービスへ
                        </a>
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
    }

    // XSS対策簡易エスケープ
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    // 初期レンダリング & タブ切り替え
    function initTabs() {
        renderCategory('all', 'all-grid');
        renderCategory('cn', 'cn-grid');
        renderCategory('global', 'global-grid');

        const tabs = document.querySelectorAll('.tab-btn');
        const panes = document.querySelectorAll('.tab-pane');
        tabs.forEach(btn => {
            btn.addEventListener('click', () => {
                const tabId = btn.getAttribute('data-tab');
                // アクティブクラス切り替え
                tabs.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                // pane表示
                panes.forEach(pane => pane.classList.remove('active-pane'));
                if (tabId === 'all') {
                    document.getElementById('tab-all').classList.add('active-pane');
                } else if (tabId === 'cn') {
                    document.getElementById('tab-cn').classList.add('active-pane');
                } else if (tabId === 'global') {
                    document.getElementById('tab-global').classList.add('active-pane');
                }
            });
        });
    }

    // 補足: 近未来的なジェスチャー、あと中華製ページを全面的にフィーチャーしていることも明確に。
    // さらに深層: カスタムフォントダウンロード完了後にもグリッド演出
    window.addEventListener('DOMContentLoaded', () => {
        initTabs();
        // 追加: ページロード時のフェード（微細）
        document.body.style.opacity = '0';
        setTimeout(() => {
            document.body.style.transition = 'opacity 0.5s ease';
            document.body.style.opacity = '1';
        }, 50);
    });
</script>

<!-- いくつか追加の中華製サービスを明示的に含む（完全なリストではないが便利さ重視） 
     デザインコードに組み込み済み -->
</body>
</html>
