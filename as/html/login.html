<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚠ WARNING ⚠</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/main2.css">
</head>
<body class="glitch-bg">
    <div class="monitor-flicker"></div>
    <div class="login-box">
        <header>
            <h1 class="warning-text">ACCESS DENIED</h1>
            <p class="sub-text">IDENTIFY YOURSELF</p>
        </header>
        
        <div class="input-area">
            <input type="text" id="username" placeholder="NAME..." autocomplete="off">
            <input type="password" id="password" placeholder="KEY..." autocomplete="off">
        </div>

        <button id="loginButton" class="scary-button">
            PROCEED
        </button>

        <div class="footer-msg">
            <p id="hint">DARKER, DARKER, YET DARKER.</p>
        </div>
    </div>
    <script src="../js/login.js"></script>
</body>
</html>
